{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="main-card p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: var(--primary-slate);">Welcome Back</h2>
                <p class="text-muted">Login to continue swapping skills</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mb-4 small fw-bold" style="border-radius: 12px; border: none;">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" name="username" class="form-control rounded-3 border-0 bg-light p-3" placeholder="Enter your username" required style="border-radius: 12px;">
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="id_password" class="form-control bg-light border-0 p-3" placeholder="Enter your password" required style="border-radius: 12px 0 0 12px;">
                        
                        <span class="input-group-text bg-light border-0" style="border-radius: 0 12px 12px 0; cursor: pointer;" onclick="togglePassword('id_password', this)">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-edu w-100 py-3 shadow mb-3">Login to EduSwap</button>
                
                <div class="text-center">
                    <p class="small text-muted">Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-teal); text-decoration: none; font-weight: 700;">Join Now</a></p>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, iconElement) {
        const passwordInput = document.getElementById(inputId);
        const icon = iconElement.querySelector('i');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
</script>
{% endblock %}
